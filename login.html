<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - AI Study Helper</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f1f5f9;
}

.container{
display:flex;
width:900px;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.left{
flex:1;
background:#2563eb;
color:white;
padding:60px;
display:flex;
flex-direction:column;
justify-content:center;
}

.left h1{
font-size:32px;
margin-bottom:20px;
}

.left p{
opacity:0.9;
}

.right{
flex:1;
padding:60px;
}

.right h2{
margin-bottom:30px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
border:none;
background:#2563eb;
color:white;
border-radius:8px;
cursor:pointer;
}

.google{
margin-top:10px;
background:#ea4335;
}

.links{
margin-top:15px;
font-size:14px;
display:flex;
justify-content:space-between;
}

.links a{
text-decoration:none;
color:#2563eb;
}

</style>

</head>

<body>

<div class="container">

<div class="left">

<h1>Welcome Back</h1>

<p>
Login to continue using AI Study Helper and boost your productivity.
</p>

</div>


<div class="right">

<h2>Login</h2>

<form onsubmit="return false;">

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button type="button" onclick="loginUser()">Login</button>

<button type="button" class="google">Login with Google</button>

</form>

<div class="links">

<a href="#">Forgot Password?</a>

<a href="signup.html">Create Account</a>

</div>

</div>

</div>


<script>

const API_URL="https://script.google.com/macros/s/AKfycbwvYz5b0hyz86tZxARb0eOdYFpxxpaZ4ODIkgQbf782iH2l70m1BGwRDlmrXXoWVQGQbg/exec";

async function loginUser(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

if(email===""||password===""){
alert("Please enter email and password");
return;
}

const res=await fetch(API_URL);
const db=await res.json();

const user=db.users.find(u=>u.email===email && u.password===password);

if(user){

localStorage.setItem("currentUser",JSON.stringify(user));

alert("Login successful");

window.location.href="dashboard.html";

}
else{

alert("Invalid email or password");

}

}

</script>

</body>
</html>
