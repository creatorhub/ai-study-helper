<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel - AI Study Helper</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
background:#f1f5f9;
height:100vh;
}

.sidebar{
width:240px;
background:#111827;
color:white;
padding:30px;
}

.sidebar ul{
list-style:none;
}

.sidebar li{
margin:20px 0;
}

.sidebar a{
color:white;
text-decoration:none;
}

.main{
flex:1;
padding:40px;
overflow:auto;
}

h1{
margin-bottom:30px;
}

.card-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:40px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.table{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
margin-bottom:30px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Admin</h2>

<ul>

<li><a href="#">Dashboard</a></li>
<li><a href="index.html">Website</a></li>

</ul>

</div>


<div class="main">

<h1>Admin Panel</h1>

<div class="card-grid">

<div class="card">
<h3>Total Users</h3>
<p id="userCount">0</p>
</div>

<div class="card">
<h3>Total Notes</h3>
<p id="notesCount">0</p>
</div>

<div class="card">
<h3>Homework Questions</h3>
<p id="homeworkCount">0</p>
</div>

<div class="card">
<h3>Quiz Attempts</h3>
<p id="quizCount">0</p>
</div>

</div>


<div class="table">

<h3>Users</h3>

<table>

<thead>
<tr>
<th>Name</th>
<th>Email</th>
</tr>
</thead>

<tbody id="userTable"></tbody>

</table>

</div>


</div>


<script>

const API_URL="https://script.google.com/macros/s/AKfycbwvYz5b0hyz86tZxARb0eOdYFpxxpaZ4ODIkgQbf782iH2l70m1BGwRDlmrXXoWVQGQbg/exec";

async function loadAdmin(){

const res = await fetch(API_URL);

const db = await res.json();


document.getElementById("userCount").innerText = db.users.length;

document.getElementById("notesCount").innerText = db.notes.length;

document.getElementById("homeworkCount").innerText = db.homework.length;

document.getElementById("quizCount").innerText = db.quiz.length;


let table="";

db.users.forEach(u=>{

table += `
<tr>
<td>${u.name}</td>
<td>${u.email}</td>
</tr>
`;

});

document.getElementById("userTable").innerHTML = table;

}

window.onload = loadAdmin;

</script>

</body>
</html>
