<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Homework Helper - AI Study Helper</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
height:100vh;
background:#f1f5f9;
}

.sidebar{
width:240px;
background:#2563eb;
color:white;
padding:30px;
}

.sidebar ul{
list-style:none;
}

.sidebar li{
margin:20px 0;
}

.sidebar a{
color:white;
text-decoration:none;
}

.main{
flex:1;
padding:40px;
}

textarea{
width:100%;
height:150px;
padding:15px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:20px;
}

button{
padding:12px 20px;
border:none;
background:#2563eb;
color:white;
border-radius:8px;
cursor:pointer;
}

.answer-box{
margin-top:30px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

</style>

</head>

<body>

<div class="sidebar">

<h2>AI Study</h2>

<ul>

<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="notes.html">Notes Summarizer</a></li>
<li><a href="#">Homework Helper</a></li>
<li><a href="planner.html">Study Planner</a></li>
<li><a href="test.html">Mock Test</a></li>
<li><a href="index.html">Logout</a></li>

</ul>

</div>


<div class="main">

<h1>AI Homework Helper</h1>

<p style="margin:10px 0 20px 0;">
Type your homework question and get an explanation.
</p>

<textarea id="questionInput" placeholder="Type your question here..."></textarea>

<button onclick="getAnswer()">Get Answer</button>

<div class="answer-box">

<h3>Answer</h3>

<p id="answerOutput">
The explanation will appear here.
</p>

</div>

</div>


<script>

const API_URL="https://script.google.com/macros/s/AKfycbwvYz5b0hyz86tZxARb0eOdYFpxxpaZ4ODIkgQbf782iH2l70m1BGwRDlmrXXoWVQGQbg/exec";

async function getAnswer(){

let question=document.getElementById("questionInput").value;

if(question===""){
alert("Enter your question");
return;
}

document.getElementById("answerOutput").innerText="🤖 AI is thinking...";

try{

const res=await fetch(API_URL,{
method:"POST",
body:JSON.stringify({

type:"ai",
prompt:question

})
});

const data=await res.json();

let answer=data.answer;

document.getElementById("answerOutput").innerText=answer;

saveHomeworkToDrive(question,answer);

}
catch(error){

document.getElementById("answerOutput").innerText="Error getting AI response.";

}

}

function saveHomeworkToDrive(question,answer){

let user=JSON.parse(localStorage.getItem("currentUser"));

fetch(API_URL,{
method:"POST",
body:JSON.stringify({

type:"homework",

data:{
user:user ? user.email : "guest",
question:question,
answer:answer
}

})

});

}

</script>

</body>
</html>
