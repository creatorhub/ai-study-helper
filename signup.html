<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signup - AI Study Helper</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f1f5f9;
}

.container{
display:flex;
width:900px;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* Left */

.left{
flex:1;
background:#2563eb;
color:white;
padding:60px;
display:flex;
flex-direction:column;
justify-content:center;
}

.left h1{
font-size:32px;
margin-bottom:20px;
}

.left p{
opacity:0.9;
}

/* Right */

.right{
flex:1;
padding:60px;
}

.right h2{
margin-bottom:30px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
border:none;
background:#2563eb;
color:white;
border-radius:8px;
cursor:pointer;
}

.google{
margin-top:10px;
background:#ea4335;
}

.links{
margin-top:15px;
font-size:14px;
text-align:center;
}

.links a{
text-decoration:none;
color:#2563eb;
}

</style>

</head>

<body>

<div class="container">

<div class="left">

<h1>Create Account</h1>

<p>
Join AI Study Helper and start studying smarter with AI tools.
</p>

</div>


<div class="right">

<h2>Sign Up</h2>

<form>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<input type="password" placeholder="Confirm Password">

<button>Create Account</button>

<button class="google">Sign up with Google</button>

</form>

<div class="links">

<p>Already have an account? <a href="login.html">Login</a></p>

</div>

</div>

</div>

</body>
</html>
