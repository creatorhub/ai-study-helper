<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Mock Test - AI Study Helper</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
height:100vh;
background:#f1f5f9;
}

.sidebar{
width:240px;
background:#2563eb;
color:white;
padding:30px;
}

.sidebar ul{
list-style:none;
}

.sidebar li{
margin:20px 0;
}

.sidebar a{
color:white;
text-decoration:none;
}

.main{
flex:1;
padding:40px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:15px;
}

button{
padding:12px 20px;
border:none;
background:#2563eb;
color:white;
border-radius:8px;
cursor:pointer;
}

.quiz-box{
margin-top:30px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.option{
margin:10px 0;
}

.result{
margin-top:20px;
font-weight:bold;
font-size:18px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>AI Study</h2>

<ul>
<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="notes.html">Notes Summarizer</a></li>
<li><a href="homework.html">Homework Helper</a></li>
<li><a href="planner.html">Study Planner</a></li>
<li><a href="#">Mock Test</a></li>
<li><a href="index.html">Logout</a></li>
</ul>

</div>


<div class="main">

<h1>AI Mock Test Generator</h1>

<p>Enter a topic to generate quiz questions.</p>

<input id="topicInput" placeholder="Example: Photosynthesis">

<button onclick="generateQuiz()">Generate Quiz</button>

<div class="quiz-box" id="quizBox" style="display:none;">

<h3 id="question"></h3>

<div id="options"></div>

<button onclick="nextQuestion()">Next</button>

<div class="result" id="result"></div>

</div>

</div>


<script>

const API_URL="https://script.google.com/macros/s/AKfycbwvYz5b0hyz86tZxARb0eOdYFpxxpaZ4ODIkgQbf782iH2l70m1BGwRDlmrXXoWVQGQbg/exec";

let questions=[];
let currentQuestion=0;
let score=0;

async function generateQuiz(){

let topic=document.getElementById("topicInput").value;

if(topic===""){
alert("Enter topic");
return;
}

document.getElementById("quizBox").style.display="block";
document.getElementById("question").innerText="🤖 Generating quiz...";

const res=await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
type:"ai",
prompt:"Create 5 multiple choice questions about "+topic+" with options and correct answer in JSON format."
})
});

const data=await res.json();

try{

questions=JSON.parse(data.answer);

currentQuestion=0;
score=0;

loadQuestion();

}catch{

document.getElementById("question").innerText="AI response format error.";

}

}

function loadQuestion(){

let q=questions[currentQuestion];

document.getElementById("question").innerText=q.question;

let optionsHTML="";

q.options.forEach(opt=>{

optionsHTML+=`
<div class="option">
<label>
<input type="radio" name="answer" value="${opt}">
${opt}
</label>
</div>
`;

});

document.getElementById("options").innerHTML=optionsHTML;

}

function nextQuestion(){

let selected=document.querySelector("input[name='answer']:checked");

if(!selected){
alert("Select answer");
return;
}

if(selected.value===questions[currentQuestion].answer){
score++;
}

currentQuestion++;

if(currentQuestion<questions.length){

loadQuestion();

}else{

document.getElementById("quizBox").innerHTML=
"<h2>Your Score: "+score+" / "+questions.length+"</h2>";

saveQuizResult(score,questions.length);

}

}

function saveQuizResult(score,total){

let user=JSON.parse(localStorage.getItem("currentUser"));

fetch(API_URL,{
method:"POST",
body:JSON.stringify({

type:"quiz",

data:{
user:user ? user.email : "guest",
score:score,
total:total
}

})

});

}

</script>

</body>
</html>
