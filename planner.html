<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Study Planner - AI Study Helper</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
height:100vh;
background:#f1f5f9;
}

.sidebar{
width:240px;
background:#2563eb;
color:white;
padding:30px;
}

.sidebar ul{
list-style:none;
}

.sidebar li{
margin:20px 0;
}

.sidebar a{
color:white;
text-decoration:none;
}

.main{
flex:1;
padding:40px;
}

input, textarea{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
background:#2563eb;
color:white;
border-radius:8px;
cursor:pointer;
}

.task-list{
margin-top:30px;
}

.task{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
display:flex;
justify-content:space-between;
align-items:center;
}

.task.done{
text-decoration:line-through;
opacity:0.6;
}

.task button{
margin-left:8px;
padding:6px 10px;
font-size:12px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>AI Study</h2>

<ul>

<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="notes.html">Notes Summarizer</a></li>
<li><a href="homework.html">Homework Helper</a></li>
<li><a href="#">Study Planner</a></li>
<li><a href="test.html">Mock Test</a></li>
<li><a href="index.html">Logout</a></li>

</ul>

</div>


<div class="main">

<h1>Study Planner</h1>

<p style="margin:10px 0 20px 0;">
Add your study tasks and manage your learning schedule.
</p>

<input id="taskInput" type="text" placeholder="Study Task">

<input id="dateInput" type="date">

<textarea id="noteInput" placeholder="Notes or details"></textarea>

<button onclick="addTask()">Add Task</button>

<div class="task-list">

<h3 style="margin-bottom:15px;">Today's Tasks</h3>

<div id="taskList"></div>

</div>

</div>


<script>

const API_URL="https://script.google.com/macros/s/AKfycbwvYz5b0hyz86tZxARb0eOdYFpxxpaZ4ODIkgQbf782iH2l70m1BGwRDlmrXXoWVQGQbg/exec";


function loadTasks(){

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

let list = document.getElementById("taskList");

list.innerHTML="";

tasks.forEach((task,index)=>{

let div = document.createElement("div");

div.className="task";

div.innerHTML=`
<span>${task.text} - ${task.date}</span>

<div>
<button onclick="completeTask(${index})">✔</button>
<button onclick="deleteTask(${index})">✖</button>
</div>
`;

if(task.done){

div.classList.add("done");

}

list.appendChild(div);

});

}


function addTask(){

let text=document.getElementById("taskInput").value;
let date=document.getElementById("dateInput").value;

if(text===""){
alert("Enter a task");
return;
}

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

let newTask={
text:text,
date:date,
done:false
};

tasks.push(newTask);

localStorage.setItem("tasks",JSON.stringify(tasks));

saveTaskToDrive(newTask);

document.getElementById("taskInput").value="";

loadTasks();

}


function saveTaskToDrive(task){

let user=JSON.parse(localStorage.getItem("currentUser"));

fetch(API_URL,{

method:"POST",

body:JSON.stringify({

type:"planner",

data:{
user:user ? user.email : "guest",
task:task.text,
date:task.date
}

})

});

}


function deleteTask(index){

let tasks=JSON.parse(localStorage.getItem("tasks"));

tasks.splice(index,1);

localStorage.setItem("tasks",JSON.stringify(tasks));

loadTasks();

}


function completeTask(index){

let tasks=JSON.parse(localStorage.getItem("tasks"));

tasks[index].done=!tasks[index].done;

localStorage.setItem("tasks",JSON.stringify(tasks));

loadTasks();

}

window.onload=loadTasks;

</script>

</body>
</html>
