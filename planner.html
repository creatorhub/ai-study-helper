<!DOCTYPE html>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
height:100vh;
background:#f1f5f9;
}

/* Sidebar */

.sidebar{

.sidebar h2{
margin-bottom:30px;
}

.sidebar ul{
list-style:none;
}

.sidebar li{
margin:20px 0;
}

.sidebar a{
color:white;
text-decoration:none;
}

/* Main */

.main{
flex:1;
padding:40px;
}

input, textarea{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px 20px;
border:none;
background:#2563eb;
color:white;

cursor:pointer;
}

.task-list{
margin-top:30px;
}

.task{

padding:15px;

margin-bottom:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

</style>

</head>

<div class="sidebar">

<h2>AI Study</h2>

<ul>

Add your study tasks and manage your learning schedule.
</p>

<input type="text" placeholder="Study Task">

<input type="date">

<textarea placeholder="Notes or details"></textarea>

<button>Add Task</button>

<div class="task-list">
